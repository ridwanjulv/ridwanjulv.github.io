<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Your Name</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .load-more-wrap { padding: 2.5rem 0 0; text-align: center; }
  .load-more-btn {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background: none;
    border: 1px solid var(--rule);
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .load-more-btn:hover { color: var(--rust); border-color: var(--rust); }
  .blog-empty {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    padding: 3rem 0;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-mark">Your Name</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="portofolio.html">Work</a></li>
    <li><a href="about.html#experience">Experience</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="page-wrap">
  <section id="blog">
    <div class="section-label" data-n="01">Blog</div>
    <div class="blog-grid" id="blog-grid"></div>
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="load-more-btn" id="load-more-btn">Load older posts</button>
    </div>
  </section>
</div>

<footer>
  <span>© 2025 Your Name</span>
  <span>Built by hand — no frameworks</span>
</footer>

<script src="assets/js/main.js"></script>
<script>
(function () {
  var INITIAL = 6;
  var BATCH   = 3;
  var posts   = [];
  var loaded  = 0;

  var grid = document.getElementById('blog-grid');
  var wrap = document.getElementById('load-more-wrap');
  var btn  = document.getElementById('load-more-btn');

  function cardHTML(post) {
    return '<a href="posts/' + post.slug + '.html" class="blog-card">'
      + '<div class="blog-tag">' + esc(post.tag) + '</div>'
      + '<h3 class="blog-title">' + esc(post.title) + '</h3>'
      + '<div class="blog-foot">'
      + '<span class="blog-date">' + esc(post.date) + '</span>'
      + '<span class="blog-arrow">\u2197</span>'
      + '</div></a>';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderBatch(n) {
    var slice = posts.slice(loaded, loaded + n);
    slice.forEach(function (post) {
      grid.insertAdjacentHTML('beforeend', cardHTML(post));
    });
    loaded += slice.length;
  }

  function updateControls() {
    wrap.style.display = loaded < posts.length ? 'block' : 'none';
  }

  btn.addEventListener('click', function () {
    renderBatch(BATCH);
    updateControls();
  });

  fetch('posts/posts.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      posts = data.posts || [];
      if (posts.length === 0) {
        grid.innerHTML = '<p class="blog-empty">No posts yet.</p>';
        return;
      }
      renderBatch(INITIAL);
      updateControls();
    })
    .catch(function () {
      grid.innerHTML = '<p class="blog-empty">Could not load posts.</p>';
    });
}());
</script>
</body>
</html>
